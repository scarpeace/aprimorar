services:
  db:
    image: postgres:15-alpine
    container_name: aprimorar-db-prod
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: aprimorar
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d aprimorar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: aprimorar-api-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: aprimorar-web-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
