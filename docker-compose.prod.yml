services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: aprimorar
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d aprimorar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: registry.gitlab.com/scarpellini1/aprimorar/server:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    expose:
      - "8080"

  frontend:
    image: registry.gitlab.com/scarpellini1/aprimorar/client:latest
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  pg_data:
