spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aprimorar
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      format_sql: true
    show-sql: true
  output:
    ansi:
      enabled: always
  flyway:
    enabled: true
    locations: classpath:db/migration, classpath:db/seed
  logging:
    level:
      com.aprimorar: DEBUG
