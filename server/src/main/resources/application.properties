spring.application.name=aprimorar-api
spring.profiles.active=dev

spring.jackson.time-zone=UTC
spring.docker.compose.enabled=false
spring.main.lazy-initialization=false
spring.config.import=optional:file:./.env[.properties],optional:file:./.env.local[.properties],optional:file:./server/.env[.properties],optional:file:./server/.env.local[.properties]

# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

server.servlet.session.timeout=8h

springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.version=openapi_3_0
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.override-with-generic-response=false

jwt.public.key=classpath:jwt/app.pub
jwt.private.key=classpath:jwt/app.key

aprimorar.admin-id=${APRIMORAR_ADMIN_ID:b3a092e0-fc48-43ff-8b35-149eb81a033f}
aprimorar.admin-username=${APP_ADMIN_USERNAME:admin@aprimorar.com}
aprimorar.admin-password=${APP_ADMIN_PASSWORD:}
aprimorar.ghost-student-id=${APRIMORAR_GHOST_STUDENT_ID:}
aprimorar.ghost-colaborador-id=${APRIMORAR_GHOST_COLABORADOR_ID:}

app.security.cors.allowed-origins=
app.security.cors.allowed-origin-patterns=
