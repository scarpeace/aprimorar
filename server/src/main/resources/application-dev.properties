spring.datasource.url=jdbc:postgresql://localhost:5432/aprimorar
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# spring.sql.init.mode=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:db/migration,classpath:db/dev/migration

spring.output.ansi.enabled=always

logging.level.com.aprimorar=DEBUG

app.security.cors.allowed-origins=http://localhost:5173
