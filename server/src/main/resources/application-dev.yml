spring:
  docker:
    compose:
      enabled: false
  main:
    lazy-initialization: false
  jackson:
    time-zone: UTC

  datasource:
    url: jdbc:postgresql://localhost:5432/aprimorar
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
      # defer: true
      # show-sql: true
      format_sql: true
      jdbc:
        time_zone: UTC
        show-sql: true

  output:
    ansi:
      enabled: always

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/dev/migration

jwt:
  public:
    key: classpath:jwt/app.pub
  private:
    key: classpath:jwt/app.key

logging:
  level:
    com.aprimorar: DEBUG

app:
  security:
    cors:
      allowed-origins:
        - "http://localhost:5173"
