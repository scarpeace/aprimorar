spring:
  docker:
    compose:
      enabled: false
  main:
    lazy-initialization: false
  jackson:
    time-zone: UTC

  datasource:
    url: jdbc:postgresql://localhost:5432/aprimorar
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
      format_sql: true
      jdbc:
        time_zone: UTC
        show-sql: true

  output:
    ansi:
      enabled: always

  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      com.aprimorar: DEBUG
