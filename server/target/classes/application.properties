spring.application.name=aprimorar-api
spring.profiles.active=dev

spring.mvc.problemdetails.enabled=true
spring.jackson.time-zone=UTC
spring.docker.compose.enabled=false
spring.main.lazy-initialization=false

# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

server.servlet.session.timeout=8h

springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.version=openapi_3_0
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.override-with-generic-response=false

jwt.public.key=classpath:jwt/app.pub
jwt.private.key=classpath:jwt/app.key

app.security.cors.allowed-origins=
app.security.cors.allowed-origin-patterns=
