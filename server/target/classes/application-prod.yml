spring:
  docker:
    compose:
      enabled: false
  main:
    lazy-initialization: false
  jackson:
    time-zone: UTC

  datasource:
    url: jdbc:postgresql://db:5432/aprimorar
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  public:
    key: classpath:jwt/app.pub
  private:
    key: classpath:jwt/app.key

logging:
  level:
    com.aprimorar: INFO

app:
  security:
    cors:
      allowed-origins:
        - "http://localhost"
        - "http://localhost:5173"
