stages:
  - test
  - build
  - docker
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository
    - client/node_modules

backend-test:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - mkdir -p server/src/main/resources/jwt
    - openssl genrsa -out server/src/main/resources/jwt/app.key 2048
    - openssl rsa -in server/src/main/resources/jwt/app.key -pubout -out server/src/main/resources/jwt/app.pub
    - chmod +x server/mvnw
  script:
    - cd server && ./mvnw test

backend-build:
  stage: build
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - mkdir -p server/src/main/resources/jwt
    - openssl genrsa -out server/src/main/resources/jwt/app.key 2048
    - openssl rsa -in server/src/main/resources/jwt/app.key -pubout -out server/src/main/resources/jwt/app.pub
    - chmod +x server/mvnw
  script:
    - cd server && ./mvnw package -DskipTests
  artifacts:
    paths:
      - server/target/*.jar

frontend-build:
  stage: build
  image: node:22-alpine
  cache:
    paths:
      - client/node_modules
  script:
    - cd client
    - npm ci
    - npm run build
  artifacts:
    paths:
      - client/.next/
      - client/package.json
      - client/package-lock.json

backend-docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - backend-build
  before_script:
    - mkdir -p server/src/main/resources/jwt
    - openssl genrsa -out server/src/main/resources/jwt/app.key 2048
    - openssl rsa -in server/src/main/resources/jwt/app.key -pubout -out server/src/main/resources/jwt/app.pub
    - chmod +x server/mvnw
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $SERVER_IMAGE ./server
    - docker push $SERVER_IMAGE
  only:
    - main

frontend-docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - frontend-build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CLIENT_IMAGE ./client
    - docker push $CLIENT_IMAGE
  only:
    - main

stack-deploy:
  stage: deploy
  image: curlimages/curl:latest
  needs:
    - backend-docker
    - frontend-docker
  script:
    - |
      curl --fail -k -X GET \
        "http://109.123.255.19:8000/api/v1/deploy?uuid=$COOLIFY_PROJECT_UUID&force=false" \
        -H "Authorization: Bearer $COOLIFY_TOKEN"
  only:
    - main
